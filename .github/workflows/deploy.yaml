name: CI/CD - ECS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ENV: dev
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # CHECKOUT CODE
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v3

      # ----------------------------
      # AWS CONFIG
      # ----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------
      # LOGIN TO ECR
      # ----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ----------------------------
      # GET ECR REPO URI
      # ----------------------------
      - name: Set ECR URI
        run: |
          echo "ECR_URI=$(aws ecr describe-repositories \
          --repository-names webapp-dev \
          --query 'repositories[0].repositoryUri' \
          --output text)" >> $GITHUB_ENV

      # ----------------------------
      # BUILD FRONTEND
      # ----------------------------
      - name: Build Frontend Image
        run: |
          docker build -t frontend:$IMAGE_TAG -f expense/frontend/Dockerfile expense/frontend

      # ----------------------------
      # BUILD BACKEND
      # ----------------------------
      - name: Build Backend Image
        run: |
          docker build -t backend:$IMAGE_TAG -f expense/backend/Dockerfile expense/backend

      # ----------------------------
      # TAG IMAGES
      # ----------------------------
      - name: Tag Images
        run: |
          docker tag frontend:$IMAGE_TAG $ECR_URI:frontend-$IMAGE_TAG
          docker tag backend:$IMAGE_TAG $ECR_URI:backend-$IMAGE_TAG

      # ----------------------------
      # PUSH IMAGES
      # ----------------------------
      - name: Push Images
        run: |
          docker push $ECR_URI:frontend-$IMAGE_TAG
          docker push $ECR_URI:backend-$IMAGE_TAG

      # ----------------------------
      # UPDATE ECS TASK DEFINITION
      # ----------------------------
      - name: Update Task Definition
        run: |
          set -e

          FRONTEND_IMAGE="$ECR_URI:frontend-$IMAGE_TAG"
          BACKEND_IMAGE="$ECR_URI:backend-$IMAGE_TAG"

          aws ecs describe-task-definition \
            --task-definition webapp-task-dev \
            --query taskDefinition > task-def.json

          cat task-def.json | jq --arg FE "$FRONTEND_IMAGE" --arg BE "$BACKEND_IMAGE" '
            .containerDefinitions |= map(
              if .name == "frontend" then .image = $FE
              elif .name == "backend" then .image = $BE
              else .
              end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' > new-task-def.json

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

      # ----------------------------
      # DEPLOY TO ECS
      # ----------------------------
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ecs-cluster-dev \
            --service webapp-service-dev \
            --task-definition $TASK_DEF_ARN \
            --force-new-deployment